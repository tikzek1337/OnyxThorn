// OnyxThorn enterprise-config style overrides that travel as `defaults/pref/onyxthorn.cfg`.
// Loaded via `general.config.filename = onyxthorn.cfg` from the per-channel prefs.
// Use `lockPref` for things users must never disable.

// IMPORTANT comment header required by autoconfig: this MUST be line 1.

lockPref("app.shield.optoutstudies.enabled", false);
lockPref("app.normandy.enabled", false);
lockPref("datareporting.healthreport.uploadEnabled", false);
lockPref("datareporting.policy.dataSubmissionEnabled", false);
lockPref("toolkit.telemetry.enabled", false);
lockPref("toolkit.telemetry.unified", false);
lockPref("toolkit.telemetry.archive.enabled", false);
lockPref("toolkit.coverage.opt-out", true);

// Mozilla Account / Firefox Sync stays off forever.
lockPref("identity.fxaccounts.enabled", false);
lockPref("services.sync.enabled", false);

// Pocket gone.
lockPref("extensions.pocket.enabled", false);

// Crash reporter URL blanked.
lockPref("breakpad.reportURL", "");
